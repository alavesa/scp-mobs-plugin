name: ScpMobs
version: '0.1.0'
main: fi.alavesa.scpmobs.ScpMobsPlugin
api-version: '1.21'
author: Piia Alavesa
description: Moving SCPs - SCP-173, SCP-106, and the blink meter.
commands:
  scpmob:
    description: Spawn and manage SCP mobs
    usage: |
      /scpmob spawn <173|106>
      /scpmob remove          (SCPs within 16 blocks)
      /scpmob pd set|clear    (SCP-106 pocket dimension at your position)
      /scpmob blink on|off
permissions:
  scpmobs.admin:
    description: Manage SCP mobs
    default: op
