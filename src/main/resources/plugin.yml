name: ScpMobs
version: '0.7.2'
main: fi.alavesa.scpmobs.ScpMobsPlugin
softdepend: [Labra]
api-version: '1.21'
author: Piia Alavesa
description: Moving SCPs - SCP-173, SCP-106, SCP-650, SCP-049, SCP-939, SCP-999, and the blink meter.
commands:
  scpmob:
    description: Spawn and manage SCP mobs
    usage: |
      /scpmob spawn <173|106|650|049|939|999>
      /scpmob remove          (SCPs within 16 blocks)
      /scpmob pd tp           (enter the pocket dimension to build)
      /scpmob pd set|clear    (arrival point of the pocket dimension)
      /scpmob pd exit|clearexits|time <s>  (escape route + timer out of the PD)
      /scpmob pd door|cleardoors  (link rooms with teleport doorways)
      /scpmob blink on|off
permissions:
  scpmobs.admin:
    description: Manage SCP mobs
    default: op
